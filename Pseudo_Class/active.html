<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body,html{
            height: 100%;
        }

        body{
            padding: 0.1%;
            background:radial-gradient(at 50% 0%, rgb(55, 65, 81), rgb(17, 24, 39), rgb(0, 0, 0)) ;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button{
            padding: 10px 8px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            background-color: aqua;
            transition: all 0.3s ease-in-out;
            color: black;
        }

        button:active{
            background-color: blueviolet;
        }
            


    </style>
</head>
<body>
    <button>HOVER ME</button>
</body>
</html>
