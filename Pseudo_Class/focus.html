<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body,html{
            height: 100%;
            width: 100%;
        }

        body{
            padding: 0.1%;
            background-color: rgb(19, 20, 20);

            display: flex;
            align-items: center;
            justify-content: center;
        }

        input{
            border-radius: 10px;
            padding: 8px 20px;
            border: none;
        }

        input:focus{
            outline: none;
        }


    </style>
</head>
<body>
    <input type="text" placeholder="Name">
</body>
</html>
