<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body,html{
            height: 100%;
            width: 100%;

        }

        body{
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button{
            padding: 20px 30px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            position: relative;
            z-index: 1;
            cursor: pointer;
            
            transition: all 0.3s ease-in-out;
            overflow: hidden;
        }

        button::before{
            content: '';
            height: 100%;
            width: 100%;
            position: absolute;
            background-color: rgb(40, 153, 15);
            top: 0;
            left: 0;

            transform: translate(-100px);
            transition: all 0.3s;
            z-index: -1;
        
        }



    </style>
</head>
<body>
    <button>Hover me</button>
</body>
</html>
